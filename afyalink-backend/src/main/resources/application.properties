# ── Server ──────────────────────────────────────────────────────────────
server.port=8080

# DevTools restart uses an extra classloader and burns metaspace (bad on low-RAM machines)
spring.devtools.restart.enabled=false

# ── PostgreSQL ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/afyalink_db
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Connection Pool (HikariCP) ───────────────────────────────────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ──────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── JWT ──────────────────────────────────────────────────────────────────
jwt.secret=afyalink_super_secret_key_change_in_production_2024_minimum_32_chars
jwt.expiration=86400000

# ── File Upload ──────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
file.upload.dir=./uploads

# ── CORS ─────────────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:4200

# ── Actuator ─────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Logging ──────────────────────────────────────────────────────────────
logging.level.com.afyalink=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ── Email & 2FA ──────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=ishimwekwibukae@gmail.com
spring.mail.password=fajbluwtcltdidal
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.2fa.otp.length=6
app.2fa.otp.expiry-minutes=10
app.2fa.max-attempts=5
app.2fa.resend-cooldown-seconds=60
app.base-url=http://localhost:3000
